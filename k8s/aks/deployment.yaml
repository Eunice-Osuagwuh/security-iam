apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklineapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tasklineapp
  template:
    metadata:
      labels:
        app: tasklineapp
    spec:
      containers:
        - name: tasklineapp
          image: REGISTRY_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000